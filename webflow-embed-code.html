<!-- Copy this to Webflow Site Settings → Custom Code → Head -->
<script>
(function() {
  const isDev = location.hostname.includes('.webflow.io');
  const baseUrl = window.SCRIPT_BASE_URL || (isDev
    ? 'http://localhost:3000/src'
    : 'https://mtnsmade.github.io/mtns-made');

  // Load the router (router then loads page-specific scripts via window.pageScript)
  const script = document.createElement('script');
  script.src = baseUrl + '/router.js';
  document.head.appendChild(script);
})();
</script>
